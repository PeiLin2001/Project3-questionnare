<h2 mat-dialog-title>新增問卷</h2>
<mat-dialog-content>
  <p>請輸入問卷資訊...</p>


<!-- pseudo div 問卷名稱 -->
<form class="example-form">
  <mat-form-field class="example-full-width">
    <mat-label>問卷名稱:</mat-label>
    <input matInput [(ngModel)]="title" name="title" placeholder="Ex. 清大校園鳥類多樣性年度紀錄調查" value="">
  </mat-form-field>

  <mat-form-field class="example-full-width">
    <mat-label>問卷描述...</mat-label>
    <textarea matInput placeholder="Ex. 本問卷旨在蒐集國立清華大學校園內鳥類物種的觀測資料，以了解校園生態多樣性與鳥類分布狀況..."></textarea>
  </mat-form-field>

  <mat-form-field class="example-full-width">
    <mat-label [(ngModel)]="questionid" name="questionid">問卷編號</mat-label>
    <input matInput placeholder="Ex. 001" >
  </mat-form-field>

</form>
<!-- pseudo div 問卷名稱 -->

  <div class="dialog-date">
    <!-- filter bar . choosedate . from -->
    <div class="theday">
    <label>From:</label><input type="date" [(ngModel)]="startDate" >
    </div>

    <!-- filter bar . choosedate . to -->
    <div class="theday">
    <label>To:</label><input type="date" [(ngModel)]="endDate">
    </div>
  </div>



  </mat-dialog-content>

<mat-dialog-actions>
  <button mat-button mat-dialog-close>取消</button>
  <button mat-button (click)="onOk()">確定新增</button>
</mat-dialog-actions>
